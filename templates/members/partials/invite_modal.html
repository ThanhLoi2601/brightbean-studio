<!-- Invite Team Member Modal -->
<template x-teleport="body">
    <div x-show="showInviteModal" x-transition.opacity
         class="fixed inset-0 z-50 flex items-center justify-center"
         style="background: rgba(0,0,0,0.4);">
        <div @click.outside="showInviteModal = false"
             x-show="showInviteModal"
             x-transition
             class="w-full max-w-lg rounded-xl shadow-xl"
             style="background: var(--surface-0);">

            <!-- Header -->
            <div class="flex items-center justify-between px-6 py-4" style="border-bottom: 1px solid var(--border);">
                <h3 class="text-base font-semibold" style="color: var(--text-primary);">Invite Team Member</h3>
                <button @click="showInviteModal = false" class="cursor-pointer" style="color: var(--text-tertiary);">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- Form -->
            <form hx-post="{% url 'members:invite' %}"
                  hx-target="#invitations-list"
                  hx-swap="beforeend"
                  @htmx:after-request.window="if(event.detail.successful) { showInviteModal = false; document.getElementById('no-invites-placeholder')?.remove(); }"
                  class="px-6 py-5">
                {% csrf_token %}

                <!-- Email -->
                <div class="mb-5">
                    <label for="invite-email" class="block text-sm font-medium mb-1.5" style="color: var(--text-primary);">Email Address</label>
                    <input type="email" id="invite-email" name="email" required placeholder="colleague@example.com"
                           class="w-full px-3 py-2 text-sm rounded-lg outline-none transition-colors"
                           style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-0);"
                           onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px var(--primary-ring)'"
                           onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='none'">
                </div>

                <!-- Org Role -->
                <div class="mb-5">
                    <label class="block text-sm font-medium mb-1.5" style="color: var(--text-primary);">Organization Role</label>
                    <div class="flex gap-3">
                        {% for value, label in org_role_choices %}
                        <label class="flex items-center gap-2 cursor-pointer text-sm" style="color: var(--text-primary);">
                            <input type="radio" name="org_role" value="{{ value }}" {% if value == "member" %}checked{% endif %}
                                   class="accent-orange-500">
                            {{ label }}
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <!-- Workspace Assignments -->
                <div class="mb-5">
                    <label class="block text-sm font-medium mb-1.5" style="color: var(--text-primary);">Assign to Workspaces</label>
                    <p class="text-xs mb-3" style="color: var(--text-tertiary);">Select workspaces and roles for this team member.</p>

                    <div class="space-y-2 max-h-48 overflow-y-auto">
                        {% for ws in org_workspaces %}
                        <div class="flex items-center gap-3 py-2 px-3 rounded-lg" style="background: var(--neutral-50);">
                            <input type="checkbox" name="ws_{{ ws.id }}" value="1" id="invite-ws-{{ ws.id }}"
                                   class="accent-orange-500 cursor-pointer">
                            <label for="invite-ws-{{ ws.id }}" class="flex-1 text-sm cursor-pointer" style="color: var(--text-primary);">
                                {{ ws.name }}
                            </label>
                            <select name="ws_role_{{ ws.id }}"
                                    class="text-xs px-2 py-1 rounded border outline-none"
                                    style="border-color: var(--border); background: var(--surface-0); color: var(--text-primary);">
                                {% for value, label in workspace_role_choices %}
                                <option value="{{ value }}" {% if value == "editor" %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endfor %}
                    </div>

                    <p class="text-xs mt-2" style="color: var(--text-tertiary);">
                        Tip: For external clients who only need portal access, use the Client Portal invite from workspace settings instead.
                    </p>
                </div>

                <!-- Error container -->
                <div id="invite-error" class="mb-3"></div>

                <!-- Submit -->
                <div class="flex justify-end gap-3">
                    <button type="button" @click="showInviteModal = false"
                            class="px-5 py-2 text-sm font-medium rounded-full cursor-pointer transition-colors"
                            style="background: var(--neutral-100); color: var(--text-primary);"
                            onmouseenter="this.style.background='var(--neutral-200)'"
                            onmouseleave="this.style.background='var(--neutral-100)'">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-5 py-2 text-sm font-medium rounded-full cursor-pointer transition-colors"
                            style="background: var(--primary); color: white;"
                            onmouseenter="this.style.opacity='0.9'"
                            onmouseleave="this.style.opacity='1'">
                        Send Invitation
                    </button>
                </div>
            </form>
        </div>
    </div>
</template>
